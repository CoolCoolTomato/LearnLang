services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: learnlang-postgres
    restart: always
    environment:
      TZ: UTC
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
      - ./init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql
    command:
      - postgres
      - -c
      - timezone=${POSTGRES_TIMEZONE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: learnlang-redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT}:6379"
    volumes:
      - ${REDIS_DATA_PATH}:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
      target: production
    container_name: learnlang-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT}:8080"
    volumes:
      - ${API_UPLOADS_PATH}:/app/uploads
      - ${API_TMP_PATH}:/app/tmp
      - ./api.config.yaml:/app/config.yaml:ro

  app:
    build:
      context: ../app
      target: production
      args:
        VITE_API_BASE_URL: ${API_PUBLIC_BASE_URL}
        VITE_API_PREFIX: /api/user
        VITE_BASENAME: ${APP_BASENAME}
    container_name: learnlang-app
    restart: always
    depends_on:
      - api
    ports:
      - "${APP_HOST_PORT}:80"
